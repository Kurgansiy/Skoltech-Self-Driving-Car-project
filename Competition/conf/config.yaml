defaults:
  - model: multi_cam_bev
  - loss: bce
  - _self_

mode: train  # train | infer

paths:
  train_dir: "../data/autonomy_yandex_dataset_train/"
  val_dir: "../data/autonomy_yandex_dataset_val/"
  test_dir: "../data/autonomy_yandex_dataset_test/"
  checkpoint: "submissions/${model.name}/model.pt"
  # Override at inference time: python main.py mode=infer paths.infer_checkpoint=path/to/model.pt
  infer_checkpoint: null

train:
  epochs: 20
  batch_size: 32
  lr: 1e-3
  max_lr: 3e-3        # OneCycleLR peak learning rate
  pct_start: 0.1      # fraction of steps used for warm-up
  num_workers: 16
  weight_decay: 1e-4
  clip_grad_norm: 35.0
  ignore_val: 255
  amp16: false        # set true to enable automatic mixed precision (CUDA only)
